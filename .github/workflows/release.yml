name: "Release"
on:
  push:
    branches:
      - main
  release:
    types: [created]

permissions:
  contents: write

jobs:
  bump:
    name: "Bump version"
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    outputs:
      new_version: ${{ steps.tag_version.outputs.new_version }}
      new_tag: ${{ steps.tag_version.outputs.new_tag }}
      changelog: ${{ steps.tag_version.outputs.changelog }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Bump version and push tag
        id: tag_version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch

  release:
    name: "Package & Release"
    needs: bump
    if: |
      always() &&
      (github.event_name == 'release' ||
       (github.event_name == 'push' && needs.bump.result == 'success' && needs.bump.outputs.new_tag != ''))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref }}

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            VERSION="${{ github.event.release.tag_name }}"
            [ -z "$VERSION" ] && echo "::error::release tag is empty" && exit 1
            echo "number=${VERSION#v}" >> "$GITHUB_OUTPUT"
            echo "tag=$VERSION"        >> "$GITHUB_OUTPUT"
          else
            VERSION="${{ needs.bump.outputs.new_version }}"
            TAG="${{ needs.bump.outputs.new_tag }}"
            [ -z "$VERSION" ] && echo "::error::bumped version is empty" && exit 1
            [ -z "$TAG" ] && echo "::error::bumped tag is empty" && exit 1
            echo "number=$VERSION" >> "$GITHUB_OUTPUT"
            echo "tag=$TAG"        >> "$GITHUB_OUTPUT"
          fi

      - name: Install just and zip
        run: |
          sudo apt-get update -qq && sudo apt-get install -yqq zip jq
          curl --proto '=https' --tlsv1.2 -sSf https://just.systems/install.sh | sudo bash -s -- --to /usr/local/bin

      - name: Stamp version in metadata
        run: |
          jq --arg v "${{ steps.version.outputs.number }}" \
            '.KPlugin.Version = $v' metadata.json > metadata.tmp.json \
            && mv metadata.tmp.json metadata.json

      - name: Build plasmoid
        run: |
          just build
          ASSET_NAME="${{ github.event.repository.name }}-${{ steps.version.outputs.number }}.plasmoid"
          mv *.plasmoid "$ASSET_NAME"
          echo "asset=$ASSET_NAME" >> "$GITHUB_OUTPUT"
        id: build

      - name: Upload release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "*.plasmoid"
          tag: ${{ steps.version.outputs.tag }}
          body: ${{ github.event_name == 'release' && github.event.release.body || needs.bump.outputs.changelog }}
          token: ${{ secrets.GITHUB_TOKEN }}
          allowUpdates: true
